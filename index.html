<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Land Analysis Pre-report</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css?v=2">
    <!-- VWorld 3D Map SDK -->
    <script src="https://map.vworld.kr/js/webglMapInit.js.do?version=2.0&apiKey=D12D5EEE-FEDA-3EE2-9283-F25E42FD7653&domain=lscape8905.github.io"></script>
</head>
<body>
    <div class="background">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
    </div>

    <main class="container">
        <header class="header" id="header">
            <div class="logo">
                <span class="icon">🌍</span>
                <h1>GeoAnalyzer</h1>
            </div>
            <p class="subtitle">AI-powered preliminary land analysis reporting</p>
        </header>

        <section class="search-section" id="searchSection">
            <div class="search-box">
                <input type="text" id="addressInput" placeholder="주소를 입력하세요 (예: 서울 서초구 서초동 123-4)" autocomplete="off">
                <button id="searchBtn" class="btn-primary">
                    <span class="btn-text">분석 시작</span>
                    <span class="btn-loader hidden"></span>
                </button>
            </div>
            <p class="api-notice">※ 본 분석은 VWorld 데이터를 기반으로 합니다.</p>
        </section>

        <section class="report-section hidden" id="reportSection">
            <div class="report-header">
                <h2 id="reportAddress">서울특별시 서초구 서초동 123-4</h2>
                <div class="badge-container">
                    <span class="badge success" id="statusBadge">분석 완료</span>
                </div>
            </div>

            <div class="grid-container">
                <!-- Data Cards -->
                <div class="card data-card" style="--delay: 0.1s">
                    <div class="card-icon">📌</div>
                    <div class="card-content">
                        <h3>지목</h3>
                        <p class="value" id="valCategory">-</p>
                    </div>
                </div>

                <div class="card data-card" style="--delay: 0.2s">
                    <div class="card-icon">🏢</div>
                    <div class="card-content">
                        <h3>용도지역</h3>
                        <p class="value" id="valZoning">-</p>
                    </div>
                </div>

                <div class="card data-card" style="--delay: 0.3s">
                    <div class="card-icon">⛰️</div>
                    <div class="card-content">
                        <h3>지형 / 경사</h3>
                        <p class="value" id="valSlope">-</p>
                    </div>
                </div>

                <div class="card data-card restriction-card" style="--delay: 0.4s">
                    <div class="card-icon">🚫</div>
                    <div class="card-content">
                        <h3>저촉 여부 (주요 규제)</h3>
                        <ul class="restriction-list" id="valRestrictions">
                            <!-- Populated via JS -->
                        </ul>
                    </div>
                </div>

                <!-- 3D Map Card -->
                <div class="card map-card" style="--delay: 0.5s">
                    <div class="map-header">
                        <h3>3D 지형도</h3>
                        <span class="status-indicator">Live</span>
                    </div>
                    <div class="map-container" id="vmap" style="width: 100%; height: 100%; min-height: 400px; position: relative;">
                    </div>
                </div>
            </div>
            
            <div class="actions">
                <button class="btn-secondary" id="resetBtn">새로운 주소 분석</button>
            </div>
        </section>
    </main>

    <script src="app.js?v=2"></script>
</body>
</html>
